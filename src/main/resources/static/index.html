<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Java Web App</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 640px; margin: 80px auto; padding: 0 20px; }
        button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 12px; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>Java Web App</h1>
    <p>Simple Spring Boot app served from EC2.</p>
    <button onclick="callApi()">Call /api/hello</button>
    <pre id="out">Click the button…</pre>
    <script>
        async function callApi() {
            const r = await fetch('/api/hello');
            document.getElementById('out').textContent = await r.text();
        }
    </script>
</body>
</html>
